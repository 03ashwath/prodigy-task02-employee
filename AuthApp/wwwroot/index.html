<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthApp — Secure Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Segoe UI',sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem
        }

        .container {
            width: 100%;
            max-width: 420px
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid #334155
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #3b82f6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9
        }

        .tabs {
            display: flex;
            background: #0f172a;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 1.5rem
        }

        .tab {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            color: #94a3b8;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Segoe UI',sans-serif;
            transition: all 0.2s
        }

            .tab.active {
                background: #3b82f6;
                color: #fff
            }

        .form-group {
            margin-bottom: 1rem
        }

        label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 5px
        }

        input {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 14px;
            font-family: 'Segoe UI',sans-serif;
            outline: none
        }

            input:focus {
                border-color: #3b82f6
            }

        .btn {
            width: 100%;
            padding: 11px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 4px;
            font-family: 'Segoe UI',sans-serif
        }

            .btn:hover {
                opacity: 0.88
            }

        .msg {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 10px;
            display: none
        }

            .msg.error {
                background: #450a0a;
                color: #fca5a5;
                display: block
            }

            .msg.success {
                background: #052e16;
                color: #86efac;
                display: block
            }

        .dash-header {
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 14px
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
            color: #f1f5f9
        }

        .user-role {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 99px;
            background: #1d4ed8;
            color: #bfdbfe
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Segoe UI',sans-serif
        }

            .logout-btn:hover {
                background: #334155
            }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1rem
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px
        }

        .stat-val {
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9
        }

        .profile-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1rem
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
            font-size: 13px
        }

            .profile-row:last-child {
                border-bottom: none
            }

        .profile-label {
            color: #64748b
        }

        .profile-val {
            color: #f1f5f9
        }

        .section-title {
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 8px
        }

        .protected-note {
            font-size: 11px;
            color: #475569;
            margin-top: 10px;
            text-align: center
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Auth Card -->
        <div class="card" id="auth-card">
            <div class="logo">
                <div class="logo-icon">🔐</div>
                <span class="logo-text">AuthApp</span>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Sign in</button>
                <button class="tab" onclick="switchTab('register')">Sign up</button>
            </div>

            <!-- Login Form -->
            <div id="login-form">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="login-email" placeholder="you@example.com" autocomplete="off" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-pw" placeholder="••••••••" autocomplete="off" />
                </div>
                <button class="btn" onclick="doLogin()">Sign in</button>
                <div class="msg" id="login-msg"></div>
            </div>

            <!-- Register Form -->
            <div id="register-form" style="display:none">
                <div class="form-group">
                    <label>Full name</label>
                    <input type="text" id="reg-name" placeholder="Your full name" autocomplete="off" />
                </div>
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="off" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-pw" placeholder="Min 6 characters" autocomplete="off" />
                </div>
                <button class="btn" onclick="doRegister()">Create account</button>
                <div class="msg" id="reg-msg"></div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" style="display:none">
            <div class="dash-header">
                <div class="user-info">
                    <div class="avatar" id="dash-avatar">U</div>
                    <div>
                        <div class="user-name" id="dash-name">Welcome</div>
                        <span class="user-role" id="dash-role">user</span>
                    </div>
                </div>
                <button class="logout-btn" onclick="doLogout()">Sign out</button>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Status</div>
                    <div class="stat-val" style="font-size:14px;color:#86efac">● Active</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Role</div>
                    <div class="stat-val" id="stat-role" style="font-size:16px">user</div>
                </div>
            </div>
            <div class="section-title">Your profile</div>
            <div class="profile-card">
                <div class="profile-row">
                    <span class="profile-label">Name</span>
                    <span class="profile-val" id="profile-name">—</span>
                </div>
                <div class="profile-row">
                    <span class="profile-label">Email</span>
                    <span class="profile-val" id="profile-email">—</span>
                </div>
                <div class="profile-row">
                    <span class="profile-label">Role</span>
                    <span class="profile-val" id="profile-role">—</span>
                </div>
            </div>
            <div class="protected-note">🔒 Protected route — authenticated users only</div>
        </div>

    </div>
    <script>
        const API = 'https://localhost:7051/api/Auth';

        function switchTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
            });
            clearMsgs();
        }

        function clearMsgs() {
            ['login-msg', 'reg-msg'].forEach(id => {
                const el = document.getElementById(id);
                el.className = 'msg'; el.textContent = '';
            });
        }

        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        async function doLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pw = document.getElementById('login-pw').value;
            if (!email || !pw) { showMsg('login-msg', 'Please fill in all fields.', 'error'); return; }
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pw })
                });
                const data = await res.json();
                if (!res.ok) { showMsg('login-msg', data.message || 'Login failed.', 'error'); return; }
                localStorage.setItem('token', data.token);
                showDashboard(data);
            } catch (e) {
                showMsg('login-msg', 'Cannot connect to server.', 'error');
            }
        }

        async function doRegister() {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pw = document.getElementById('reg-pw').value;
            if (!name || !email || !pw) { showMsg('reg-msg', 'Please fill in all fields.', 'error'); return; }
            if (pw.length < 6) { showMsg('reg-msg', 'Password must be at least 6 characters.', 'error'); return; }
            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password: pw })
                });
                const data = await res.json();
                if (!res.ok) { showMsg('reg-msg', data.message || 'Registration failed.', 'error'); return; }
                showMsg('reg-msg', 'Account created! Signing you in...', 'success');
                setTimeout(() => {
                    localStorage.setItem('token', data.token);
                    showDashboard(data);
                }, 1000);
            } catch (e) {
                showMsg('reg-msg', 'Cannot connect to server.', 'error');
            }
        }

        function showDashboard(user) {
            document.getElementById('auth-card').style.display = 'none';
            document.getElementById('dashboard').style.display = '';
            document.getElementById('dash-avatar').textContent = user.name.charAt(0).toUpperCase();
            document.getElementById('dash-name').textContent = user.name;
            document.getElementById('dash-role').textContent = user.role;
            document.getElementById('stat-role').textContent = user.role;
            document.getElementById('profile-name').textContent = user.name;
            document.getElementById('profile-email').textContent = user.email;
            document.getElementById('profile-role').textContent = user.role;
        }

        function doLogout() {
            localStorage.removeItem('token');
            document.getElementById('auth-card').style.display = '';
            document.getElementById('dashboard').style.display = 'none';
            clearMsgs();
        }

        window.onload = async () => {
            const token = localStorage.getItem('token');
            if (!token) return;
            try {
                const res = await fetch(`${API}/profile`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const user = await res.json();
                    showDashboard(user);
                } else {
                    localStorage.removeItem('token');
                }
            } catch { localStorage.removeItem('token'); }
        };
    </script>
</body>
</html>
