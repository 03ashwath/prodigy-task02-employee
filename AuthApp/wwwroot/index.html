<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthApp — Employee Management</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Segoe UI',sans-serif;
            background: #0f172a;
            min-height: 100vh;
            color: #f1f5f9
        }

        .hidden {
            display: none !important
        }

        /* Auth */
        .auth-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem
        }

        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid #334155;
            width: 100%;
            max-width: 420px
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #3b82f6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9
        }

        .tabs {
            display: flex;
            background: #0f172a;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 1.5rem
        }

        .tab {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            color: #94a3b8;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Segoe UI',sans-serif
        }

            .tab.active {
                background: #3b82f6;
                color: #fff
            }

        .form-group {
            margin-bottom: 1rem
        }

        label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 5px
        }

        input, select {
            width: 100%;
            padding: 10px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 14px;
            font-family: 'Segoe UI',sans-serif;
            outline: none
        }

            input:focus, select:focus {
                border-color: #3b82f6
            }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Segoe UI',sans-serif;
            transition: opacity .2s
        }

        .btn-primary {
            background: #3b82f6;
            color: #fff;
            width: 100%;
            margin-top: 4px
        }

            .btn-primary:hover {
                opacity: .88
            }

        .btn-success {
            background: #1D9E75;
            color: #fff
        }

        .btn-warning {
            background: #f59e0b;
            color: #fff
        }

        .btn-danger {
            background: #ef4444;
            color: #fff
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px
        }

        .msg {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 10px;
            display: none
        }

            .msg.error {
                background: #450a0a;
                color: #fca5a5;
                display: block
            }

            .msg.success {
                background: #052e16;
                color: #86efac;
                display: block
            }

        /* App Layout */
        .app-layout {
            display: flex;
            flex-direction: column;
            min-height: 100vh
        }

        .topbar {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            flex-shrink: 0
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .topbar-logo {
            width: 32px;
            height: 32px;
            background: #3b82f6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px
        }

        .topbar-title {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #3b82f6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 13px
        }

        .user-name {
            font-size: 13px;
            color: #94a3b8
        }

        .role-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 99px;
            background: #1d4ed8;
            color: #bfdbfe
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Segoe UI',sans-serif
        }

        /* Sidebar */
        .main-content {
            display: flex;
            flex: 1
        }

        .sidebar {
            width: 200px;
            background: #1e293b;
            border-right: 1px solid #334155;
            padding: 1rem 0;
            flex-shrink: 0
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            font-size: 13px;
            color: #94a3b8;
            cursor: pointer;
            transition: all .15s
        }

            .nav-item:hover {
                background: #0f172a;
                color: #f1f5f9
            }

            .nav-item.active {
                background: #1d4ed8;
                color: #fff;
                border-right: 2px solid #3b82f6
            }

        .nav-icon {
            font-size: 16px
        }

        /* Page content */
        .page {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 12px;
            margin-bottom: 1.5rem
        }

        .stat-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1rem
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px
        }

        .stat-val {
            font-size: 22px;
            font-weight: 600;
            color: #f1f5f9
        }

        /* Table */
        .table-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden
        }

        .table-toolbar {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #334155
        }

        .search-input {
            padding: 7px 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 13px;
            font-family: 'Segoe UI',sans-serif;
            outline: none;
            width: 220px
        }

            .search-input:focus {
                border-color: #3b82f6
            }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px
        }

        th {
            text-align: left;
            padding: 10px 16px;
            color: #64748b;
            font-weight: 500;
            border-bottom: 1px solid #334155;
            white-space: nowrap
        }

        td {
            padding: 10px 16px;
            border-bottom: 1px solid #1e293b;
            color: #f1f5f9;
            vertical-align: middle
        }

        tr:last-child td {
            border-bottom: none
        }

        tr:hover td {
            background: #0f172a
        }

        .status-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 99px
        }

        .status-active {
            background: #052e16;
            color: #86efac
        }

        .status-inactive {
            background: #1c1917;
            color: #a8a29e
        }

        .actions {
            display: flex;
            gap: 6px
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #475569
        }

        .empty-icon {
            font-size: 40px;
            margin-bottom: 8px
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1rem
        }

        .modal {
            background: #1e293b;
            border-radius: 16px;
            padding: 1.5rem;
            width: 100%;
            max-width: 520px;
            border: 1px solid #334155;
            max-height: 90vh;
            overflow-y: auto
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9
        }

        .close-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
            line-height: 1
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px
        }

            .form-grid .full {
                grid-column: span 2
            }

        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 1.25rem
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Segoe UI',sans-serif
        }
    </style>
</head>
<body>

    <!-- AUTH SECTION -->
    <div id="auth-section" class="auth-wrap">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">🔐</div>
                <span class="logo-text">AuthApp</span>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Sign in</button>
                <button class="tab" onclick="switchTab('register')">Sign up</button>
            </div>
            <div id="login-form">
                <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com" autocomplete="off" /></div>
                <div class="form-group"><label>Password</label><input type="password" id="login-pw" placeholder="••••••••" autocomplete="off" /></div>
                <button class="btn btn-primary" onclick="doLogin()">Sign in</button>
                <div class="msg" id="login-msg"></div>
            </div>
            <div id="register-form" style="display:none">
                <div class="form-group"><label>Full name</label><input type="text" id="reg-name" placeholder="Your name" autocomplete="off" /></div>
                <div class="form-group"><label>Email</label><input type="email" id="reg-email" placeholder="you@example.com" autocomplete="off" /></div>
                <div class="form-group"><label>Password</label><input type="password" id="reg-pw" placeholder="Min 6 characters" autocomplete="off" /></div>
                <button class="btn btn-primary" onclick="doRegister()">Create account</button>
                <div class="msg" id="reg-msg"></div>
            </div>
        </div>
    </div>

    <!-- APP SECTION -->
    <div id="app-section" class="app-layout hidden">
        <!-- Topbar -->
        <div class="topbar">
            <div class="topbar-left">
                <div class="topbar-logo">🏢</div>
                <span class="topbar-title">Employee Management System</span>
            </div>
            <div class="topbar-right">
                <div class="avatar" id="top-avatar">U</div>
                <span class="user-name" id="top-name">User</span>
                <span class="role-badge" id="top-role">user</span>
                <button class="logout-btn" onclick="doLogout()">Sign out</button>
            </div>
        </div>

        <div class="main-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="nav-item active" onclick="showPage('dashboard')"><span class="nav-icon">📊</span> Dashboard</div>
                <div class="nav-item" onclick="showPage('employees')" id="nav-employees"><span class="nav-icon">👥</span> Employees</div>
             
            </div>

            <!-- Pages -->
            <div class="page">

                <!-- Dashboard Page -->
                <div id="page-dashboard">
                    <div class="page-header"><span class="page-title">Dashboard</span></div>
                    <div class="stats-row">
                        <div class="stat-card"><div class="stat-label">Total Employees</div><div class="stat-val" id="stat-total">0</div></div>
                        <div class="stat-card"><div class="stat-label">Active</div><div class="stat-val" id="stat-active" style="color:#86efac">0</div></div>
                        <div class="stat-card"><div class="stat-label">Departments</div><div class="stat-val" id="stat-depts">0</div></div>
                        <div class="stat-card"><div class="stat-label">Logged in as</div><div class="stat-val" id="stat-role" style="font-size:16px;padding-top:4px">—</div></div>
                    </div>
                    <div class="table-card" style="padding:1rem">
                        <div style="font-size:13px;color:#94a3b8;margin-bottom:8px;font-weight:500">Recent Employees</div>
                        <table>
                            <thead><tr><th>Name</th><th>Department</th><th>Position</th><th>Status</th></tr></thead>
                            <tbody id="recent-tbody"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Employees Page -->
                <div id="page-employees" class="hidden">
                    <div class="page-header">
                        <span class="page-title">All Employees</span>
                        <button class="btn btn-success" id="add-emp-btn" onclick="openAddModal()" style="display:none">+ Add Employee</button>
                    </div>
                    <div class="table-card">
                        <div class="table-toolbar">
                            <input class="search-input" placeholder="Search by name, email, department..." oninput="searchEmployees(this.value)" id="search-box" />
                            <span style="font-size:12px;color:#64748b" id="emp-count">0 employees</span>
                        </div>
                        <table>
                            <thead><tr><th>Name</th><th>Email</th><th>Department</th><th>Position</th><th>Salary</th><th>Status</th><th id="actions-th" style="display:none">Actions</th></tr></thead>
                            <tbody id="emp-tbody"></tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div class="modal-overlay hidden" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">Add Employee</span>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="form-grid">
                <div class="form-group"><label>First Name</label><input type="text" id="m-first" placeholder="First name" autocomplete="off" /></div>
                <div class="form-group"><label>Last Name</label><input type="text" id="m-last" placeholder="Last name" autocomplete="off" /></div>
                <div class="form-group full"><label>Email</label><input type="email" id="m-email" placeholder="employee@company.com" autocomplete="off" /></div>
                <div class="form-group"><label>Phone</label><input type="text" id="m-phone" placeholder="+91 9876543210" autocomplete="off" /></div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="m-dept">
                        <option>Engineering</option>
                        <option>Marketing</option>
                        <option>Sales</option>
                        <option>HR</option>
                        <option>Finance</option>
                        <option>Operations</option>
                        <option>Design</option>
                    </select>
                </div>
                <div class="form-group"><label>Position</label><input type="text" id="m-position" placeholder="e.g. Software Engineer" autocomplete="off" /></div>
                <div class="form-group"><label>Salary (₹)</label><input type="number" id="m-salary" placeholder="50000" autocomplete="off" /></div>
                <div class="form-group"><label>Joining Date</label><input type="date" id="m-date" /></div>
                <div class="form-group full" id="status-group" style="display:none">
                    <label>Status</label>
                    <select id="m-status"><option value="true">Active</option><option value="false">Inactive</option></select>
                </div>
            </div>
            <div class="msg" id="modal-msg"></div>
            <div class="modal-footer">
                <button class="btn-outline" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" style="width:auto" onclick="saveEmployee()" id="save-btn">Save Employee</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5051/api';
        let token = '', currentUser = null, editingId = null, allEmployees = [];

        // ── AUTH ──────────────────────────────────────────────
        function switchTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')));
        }
        function showMsg(id, text, type) { const el = document.getElementById(id); el.textContent = text; el.className = 'msg ' + type; }
        function clearMsg(id) { const el = document.getElementById(id); el.className = 'msg'; el.textContent = ''; }

        async function doLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pw = document.getElementById('login-pw').value;
            if (!email || !pw) { showMsg('login-msg', 'Please fill in all fields.', 'error'); return; }
            try {
                const res = await fetch(`${API}/Auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password: pw }) });
                const data = await res.json();
                if (!res.ok) { showMsg('login-msg', data.message || 'Login failed.', 'error'); return; }
                token = data.token; currentUser = data;
                localStorage.setItem('token', token);
                showApp(data);
            } catch { showMsg('login-msg', 'Cannot connect to server.', 'error'); }
        }

        async function doRegister() {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pw = document.getElementById('reg-pw').value;
            if (!name || !email || !pw) { showMsg('reg-msg', 'Please fill in all fields.', 'error'); return; }
            if (pw.length < 6) { showMsg('reg-msg', 'Password must be at least 6 characters.', 'error'); return; }
            try {
                const res = await fetch(`${API}/Auth/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, password: pw }) });
                const data = await res.json();
                if (!res.ok) { showMsg('reg-msg', data.message || 'Registration failed.', 'error'); return; }
                showMsg('reg-msg', 'Account created! Signing you in...', 'success');
                token = data.token; currentUser = data;
                localStorage.setItem('token', token);
                setTimeout(() => showApp(data), 1000);
            } catch { showMsg('reg-msg', 'Cannot connect to server.', 'error'); }
        }

        function doLogout() {
            localStorage.removeItem('token'); token = ''; currentUser = null;
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
        }

        // ── APP ──────────────────────────────────────────────
        function showApp(user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('top-avatar').textContent = user.name.charAt(0).toUpperCase();
            document.getElementById('top-name').textContent = user.name;
            document.getElementById('top-role').textContent = user.role;
            document.getElementById('stat-role').textContent = user.role;

            // Hide admin features by default
            document.getElementById('add-emp-btn').style.display = 'none';
           
            document.getElementById('actions-th').style.display = 'none';

            // Only show admin features if role is admin
            if (user.role === 'admin') {
                document.getElementById('add-emp-btn').style.display = '';
              
                document.getElementById('actions-th').style.display = '';
            }
            loadEmployees();
        }

        function showPage(page) {
            ['dashboard', 'employees'].forEach(p => document.getElementById('page-' + p).classList.add('hidden'));
            document.getElementById('page-' + page).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if (page === 'employees') loadEmployees();
        }

        // ── EMPLOYEES ─────────────────────────────────────────
        async function loadEmployees() {
            try {
                const res = await fetch(`${API}/Employees`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) { if (res.status === 401) doLogout(); return; }
                allEmployees = await res.json();
                renderTable(allEmployees);
                updateStats(allEmployees);
                renderRecent(allEmployees);
            } catch (e) { console.error(e); }
        }

        function renderTable(employees) {
            const tbody = document.getElementById('emp-tbody');
            document.getElementById('emp-count').textContent = `${employees.length} employee${employees.length !== 1 ? 's' : ''}`;
            if (!employees.length) {
                tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">👥</div><div>No employees found</div></div></td></tr>`;
                return;
            }
            const isAdmin = currentUser?.role === 'admin';
            tbody.innerHTML = employees.map(e => `
        <tr>
          <td><strong>${e.firstName} ${e.lastName}</strong></td>
          <td style="color:#94a3b8">${e.email}</td>
          <td>${e.department}</td>
          <td>${e.position}</td>
          <td>₹${Number(e.salary).toLocaleString()}</td>
          <td><span class="status-badge ${e.isActive ? 'status-active' : 'status-inactive'}">${e.isActive ? 'Active' : 'Inactive'}</span></td>
          <td style="display:${isAdmin ? '' : 'none'}">
            <div class="actions">
              <button class="btn btn-warning btn-sm" onclick="openEditModal(${e.id})">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteEmployee(${e.id})">Delete</button>
            </div>
          </td>
        </tr>`).join('');
        }

        function renderRecent(employees) {
            const tbody = document.getElementById('recent-tbody');
            const recent = employees.slice(0, 5);
            if (!recent.length) { tbody.innerHTML = `<tr><td colspan="4" style="color:#475569;text-align:center;padding:1rem">No employees yet</td></tr>`; return; }
            tbody.innerHTML = recent.map(e => `
        <tr>
          <td><strong>${e.firstName} ${e.lastName}</strong></td>
          <td>${e.department}</td>
          <td>${e.position}</td>
          <td><span class="status-badge ${e.isActive ? 'status-active' : 'status-inactive'}">${e.isActive ? 'Active' : 'Inactive'}</span></td>
        </tr>`).join('');
        }

        function updateStats(employees) {
            document.getElementById('stat-total').textContent = employees.length;
            document.getElementById('stat-active').textContent = employees.filter(e => e.isActive).length;
            const depts = new Set(employees.map(e => e.department));
            document.getElementById('stat-depts').textContent = depts.size;
        }

        async function searchEmployees(query) {
            if (!query.trim()) { renderTable(allEmployees); return; }
            const filtered = allEmployees.filter(e =>
                `${e.firstName} ${e.lastName}`.toLowerCase().includes(query.toLowerCase()) ||
                e.email.toLowerCase().includes(query.toLowerCase()) ||
                e.department.toLowerCase().includes(query.toLowerCase())
            );
            renderTable(filtered);
        }

        // ── MODAL ─────────────────────────────────────────────
        function openAddModal() {
            editingId = null;
            document.getElementById('modal-title').textContent = 'Add Employee';
            document.getElementById('save-btn').textContent = 'Save Employee';
            document.getElementById('status-group').style.display = 'none';
            ['m-first', 'm-last', 'm-email', 'm-phone', 'm-position', 'm-salary'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('m-date').value = new Date().toISOString().split('T')[0];
            clearMsg('modal-msg');
            document.getElementById('modal').classList.remove('hidden');
        }

        function openEditModal(id) {
            const e = allEmployees.find(x => x.id === id);
            if (!e) return;
            editingId = id;
            document.getElementById('modal-title').textContent = 'Edit Employee';
            document.getElementById('save-btn').textContent = 'Update Employee';
            document.getElementById('status-group').style.display = '';
            document.getElementById('m-first').value = e.firstName;
            document.getElementById('m-last').value = e.lastName;
            document.getElementById('m-email').value = e.email;
            document.getElementById('m-phone').value = e.phone;
            document.getElementById('m-dept').value = e.department;
            document.getElementById('m-position').value = e.position;
            document.getElementById('m-salary').value = e.salary;
            document.getElementById('m-date').value = e.joiningDate?.split('T')[0] || '';
            document.getElementById('m-status').value = String(e.isActive);
            clearMsg('modal-msg');
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function saveEmployee() {
            const first = document.getElementById('m-first').value.trim();
            const last = document.getElementById('m-last').value.trim();
            const email = document.getElementById('m-email').value.trim();
            const phone = document.getElementById('m-phone').value.trim();
            const dept = document.getElementById('m-dept').value;
            const position = document.getElementById('m-position').value.trim();
            const salary = document.getElementById('m-salary').value;
            const date = document.getElementById('m-date').value;
            if (!first || !last || !email || !phone || !position || !salary) { showMsg('modal-msg', 'Please fill in all fields.', 'error'); return; }
            const body = editingId
                ? { firstName: first, lastName: last, email, phone, department: dept, position, salary: Number(salary), isActive: document.getElementById('m-status').value === 'true' }
                : { firstName: first, lastName: last, email, phone, department: dept, position, salary: Number(salary), joiningDate: date };
            const url = editingId ? `${API}/Employees/${editingId}` : `${API}/Employees`;
            const method = editingId ? 'PUT' : 'POST';
            try {
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(body) });
                const data = await res.json();
                if (!res.ok) { showMsg('modal-msg', data.message || 'Failed to save.', 'error'); return; }
                closeModal();
                await loadEmployees();
                showPage2('employees');
            } catch { showMsg('modal-msg', 'Cannot connect to server.', 'error'); }
        }

        async function deleteEmployee(id) {
            if (!confirm('Are you sure you want to delete this employee?')) return;
            try {
                const res = await fetch(`${API}/Employees/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) await loadEmployees();
                else alert('Failed to delete employee.');
            } catch { alert('Cannot connect to server.'); }
        }

        function showPage2(page) {
            ['dashboard', 'employees'].forEach(p => document.getElementById('page-' + p).classList.add('hidden'));
            document.getElementById('page-' + page).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + page)?.classList.add('active');
            if (page === 'employees') loadEmployees();
        }

        // Auto login
        window.onload = async () => {
            const t = localStorage.getItem('token');
            if (!t) return;
            try {
                const res = await fetch(`${API}/Auth/profile`, { headers: { 'Authorization': `Bearer ${t}` } });
                if (res.ok) {
                    const user = await res.json();
                    token = t; currentUser = user;
                    showApp(user);
                } else localStorage.removeItem('token');
            } catch { localStorage.removeItem('token'); }
        };
    </script>
</body>
</html>
